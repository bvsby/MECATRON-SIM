          <div class="jc-btns">
            <button class="jc-btn" ontouchstart="App.jHold('${j.id}',-1)" onmousedown="App.jHold('${j.id}',-1)" ontouchend="App.jStop('${j.id}')" onmouseup="App.jStop('${j.id}')" onmouseleave="App.jStop('${j.id}')">−</button>
            <button class="jc-btn" style="font-size:10px;color:var(--t3)" onclick="App.jReset('${j.id}')">0</button>
            <button class="jc-btn" ontouchstart="App.jHold('${j.id}',1)" onmousedown="App.jHold('${j.id}',1)" ontouchend="App.jStop('${j.id}')" onmouseup="App.jStop('${j.id}')" onmouseleave="App.jStop('${j.id}')">+</button>
          </div>
        </div>`).join('')}
      </div>`;
    }
    else if(r==='drone'){
      html=`<div class="ctrl-title">Contrôle Drone</div>
      <div class="drone-ctrl">
        <div class="drone-stick-wrap">
          <div class="stick-label">Lacet / Thrust</div>
          <div class="stick-zone" id="stick-L"
            ontouchstart="App.stickStart(event,'L')" ontouchmove="App.stickMove(event,'L')" ontouchend="App.stickEnd('L')"
            onmousedown="App.stickStart(event,'L')">
            <div class="stick-knob" id="knob-L"></div>
          </div>
        </div>
        <div class="drone-stick-wrap">
          <div class="stick-label">Direction</div>
          <div class="stick-zone" id="stick-R"
            ontouchstart="App.stickStart(event,'R')" ontouchmove="App.stickMove(event,'R')" ontouchend="App.stickEnd('R')"
            onmousedown="App.stickStart(event,'R')">
            <div class="stick-knob" id="knob-R"></div>
          </div>
        </div>
        <div class="drone-alt-ctrl">
          <div class="stick-label">Thrust</div>
          <button class="alt-btn" ontouchstart="App.kd('up',true)" ontouchend="App.kd('up',false)" onmousedown="App.kd('up',true)" onmouseup="App.kd('up',false)" onmouseleave="App.kd('up',false)">↑</button>
          <div style="font-family:'JetBrains Mono';font-size:12px;color:var(--blue);font-weight:600" id="thrust-disp">${(G.state.joints.thrust||40).toFixed(0)}%</div>
          <button class="alt-btn" ontouchstart="App.kd('down',true)" ontouchend="App.kd('down',false)" onmousedown="App.kd('down',true)" onmouseup="App.kd('down',false)" onmouseleave="App.kd('down',false)">↓</button>
        </div>
      </div>`;
    }
    else if(r==='biped'){
      html=`<div class="ctrl-title">Contrôle Bipède</div>
      <div class="biped-ctrl">
        <button class="walk-btn" id="walk-btn" onclick="App.toggleWalk()">🚶 Démarrer la marche</button>
        <div class="biped-turn">
          <button class="turn-btn" ontouchstart="App.kd('left',true)" ontouchend="App.kd('left',false)" onmousedown="App.kd('left',true)" onmouseup="App.kd('left',false)" onmouseleave="App.kd('left',false)">↺</button>
          <button class="turn-btn" style="flex:0 0 42px" onclick="App.resetRobot()">⊙</button>
          <button class="turn-btn" ontouchstart="App.kd('right',true)" ontouchend="App.kd('right',false)" onmousedown="App.kd('right',true)" onmouseup="App.kd('right',false)" onmouseleave="App.kd('right',false)">↻</button>
        </div>
        <div style="display:flex;gap:6px;width:100%">
          <button class="dpad-btn" style="flex:1;height:38px;border-radius:9px;font-size:13px" onclick="App.poseBiped('squat')">🦵 Squat</button>
          <button class="dpad-btn" style="flex:1;height:38px;border-radius:9px;font-size:13px" onclick="App.poseBiped('stand')">🧍 Debout</button>
        </div>
      </div>`;
    }
    document.getElementById('ctrl-panel-desktop')&&(document.getElementById('ctrl-panel-desktop').innerHTML=html);
    document.getElementById('ctrl-panel-mobile')&&(document.getElementById('ctrl-panel-mobile').innerHTML=html);
  },

  buildConstPanel(){
    const C=G.consts[G.robot];
    const html=`<div class="ctrl-title" style="margin-bottom:10px">Constantes — ${ROBOTS[G.robot].name}</div>
      <div class="const-grid">
        ${Object.entries(C).map(([k,p])=>`
          <div class="const-card">
            <div class="const-label">${p.l}</div>
            <input type="number" class="const-input" value="${p.v}" min="${p.mn}" max="${p.mx}" step="${(p.mx-p.mn)>10?.1:.001}"
              onchange="App.setConst('${k}',parseFloat(this.value))">
            <div class="const-unit">${p.u}</div>
          </div>`).join('')}
      </div>`;
    document.getElementById('const-panel-desktop')&&(document.getElementById('const-panel-desktop').innerHTML=html);
    document.getElementById('const-panel-mobile')&&(document.getElementById('const-panel-mobile').innerHTML=html);
  },

  setConst(k,v){
    const C=G.consts[G.robot];
    if(C[k]) C[k].v=Math.max(C[k].mn,Math.min(C[k].mx,isNaN(v)?C[k].v:v));
  },

  jIntervals:{},
  jHold(id,dir){
    if(this.jIntervals[id]) clearInterval(this.jIntervals[id]);
    this.jIntervals[id]=setInterval(()=>{
      const lim={j1:[-180,180],j2:[-90,90],j3:[-135,135],j4:[-180,180],j5:[-90,90],j6:[0,85]};
      const sp=G.consts.arm.spd.v*.033;
      const [mn,mx]=lim[id]||[-180,180];
      const cur=G.state.joints[id]||0;
      const nv=Math.max(mn,Math.min(mx,cur+dir*sp));
      G.state.joints[id]=nv;
      const el=document.getElementById('jcv-'+id);
      if(el) el.textContent=nv.toFixed(1)+'°';
      if(!G.simOn&&robotMesh){ ROBOTS.arm.kinematic(G.state,.033); ROBOTS.arm.animate(robotMesh,G.state,.033); this.updateHUD(); this.updateEq(); this.updateTelem(); }
    },33);
  },
  jStop(id){ clearInterval(this.jIntervals[id]); delete this.jIntervals[id]; },
  jReset(id){ G.state.joints[id]=0; const el=document.getElementById('jcv-'+id); if(el) el.textContent='0.0°'; if(!G.simOn&&robotMesh){ ROBOTS.arm.animate(robotMesh,G.state,.033); } },
  setJ(id,v){ G.state.joints[id]=v; },
  stopRover(){ G.state.joints.vlin=0; G.state.joints.vang=0; G.state.vlin=0; G.state.omega=0; },

  // ── JOYSTICK ROVER ANALOGIQUE ──
  _roverStickActive: false,
  _roverRect: null,
  roverStickStart(e){
    e.preventDefault(); e.stopPropagation();
    // Chercher le stick dans les deux panels (desktop et mobile)
    const el = document.getElementById('stick-rover') || document.querySelector('.stick-zone');
    if(!el) return;
    this._roverRect = el.getBoundingClientRect();
    this._roverStickActive = true;
    if(e.touches){
      this._procRoverStick(e.touches[0].clientX, e.touches[0].clientY);
    } else {
      this._procRoverStick(e.clientX, e.clientY);
      const mm = ev => { ev.preventDefault(); this._procRoverStick(ev.clientX, ev.clientY); };
      const mu = () => { this.roverStickEnd(); window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); };
      window.addEventListener('mousemove', mm);
      window.addEventListener('mouseup', mu);
    }
  },
  roverStickMove(e){
    e.preventDefault();
    if(!e.touches.length || !this._roverStickActive) return;
    this._procRoverStick(e.touches[0].clientX, e.touches[0].clientY);
  },
  _procRoverStick(cx, cy){
    const rect = this._roverRect;
    if(!rect) return;
    const r = rect.width / 2;
    let dx = Math.max(-r, Math.min(r, cx - rect.left - r));
    let dy = Math.max(-r, Math.min(r, cy - rect.top - r));
    const dist = Math.sqrt(dx*dx + dy*dy);
    if(dist > r){ dx = dx/dist*r; dy = dy/dist*r; }
    const knob = document.getElementById('knob-rover');
    if(knob){ knob.style.left=`calc(50% + ${dx}px)`; knob.style.top=`calc(50% + ${dy}px)`; }
    const nx = dx/r, ny = dy/r;
    const C = G.consts.rover;
    G.state.joints.vlin = -ny * C.vmax.v;
    G.state.joints.vang =  nx * C.vamax.v;
    const disp = document.getElementById('rover-stick-disp');
    if(disp) disp.textContent = `${(-ny*C.vmax.v).toFixed(2)} m/s · ${(nx*C.vamax.v).toFixed(0)}°/s`;
  },
  roverStickEnd(){
    this._roverStickActive = false;
    this._roverRect = null;
    const knob = document.getElementById('knob-rover');
    if(knob){ knob.style.left='50%'; knob.style.top='50%'; }
    G.state.joints.vlin = 0; G.state.joints.vang = 0;
    const disp = document.getElementById('rover-stick-disp');
    if(disp) disp.textContent = '0.00 m/s · 0°/s';
  },

  toggleWalk(){
    const w=(G.state.joints.walk||0)>.5?0:1;
    G.state.joints.walk=w;
    const btn=document.getElementById('walk-btn');
    if(btn){ btn.textContent=w>.5?'⏹ Arrêter la marche':'🚶 Démarrer la marche'; btn.classList.toggle('walking',w>.5); }
  },
  poseBiped(pose){
    if(pose==='squat'){Object.assign(G.state.joints,{hL:35,kL:65,hR:35,kR:65,walk:0});}
    if(pose==='stand'){Object.assign(G.state.joints,{hL:0,kL:0,aL:0,hR:0,kR:0,aR:0,torso:0,walk:0});}
    const btn=document.getElementById('walk-btn');
    if(btn){ btn.textContent='🚶 Démarrer la marche'; btn.classList.remove('walking'); }
    if(robotMesh) ROBOTS.biped.animate(robotMesh,G.state,.033);
  },

  kd(key,pressed){
    G.keys[key]=pressed;
    const el=document.getElementById('dp-'+key);
    if(el) el.classList.toggle('pressed',pressed);
  },

  // Joysticks drone
  stickStart(e,side){
    e.preventDefault(); e.stopPropagation();
    if(e.type.includes('mouse')){
      const mm=ev=>this.stickMoveM(ev,side);
      const mu=()=>{ this.stickEnd(side); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
      window.addEventListener('mousemove',mm); window.addEventListener('mouseup',mu);
    }
  },
  stickMoveM(e,side){
    const id='stick-'+side, rect=document.getElementById(id).getBoundingClientRect();
    this._procStick(e.clientX,e.clientY,rect,side);
  },
  stickMove(e,side){
    e.preventDefault();
    if(!e.touches.length)return;
    const id='stick-'+side, rect=document.getElementById(id).getBoundingClientRect();
    this._procStick(e.touches[0].clientX,e.touches[0].clientY,rect,side);
  },
  _procStick(cx,cy,rect,side){
    const r=rect.width/2;
    let dx=Math.max(-r,Math.min(r,cx-rect.left-r));
    let dy=Math.max(-r,Math.min(r,cy-rect.top-r));
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>r){dx=dx/dist*r;dy=dy/dist*r;}
    const knob=document.getElementById('knob-'+side);
    if(knob){knob.style.left=`calc(50% + ${dx}px)`;knob.style.top=`calc(50% + ${dy}px)`;}
    const nx=dx/r,ny=dy/r;
    if(side==='L'){
      G.state.joints.yawR=nx*80;
      G.state.joints.thrust=Math.max(0,Math.min(100,(G.state.joints.thrust||40)-ny*2.5));
      const el=document.getElementById('thrust-disp'); if(el) el.textContent=(G.state.joints.thrust||40).toFixed(0)+'%';
    }
    if(side==='R'){G.state.joints.pitch=-ny*32; G.state.joints.roll=nx*28;}
  },
  stickEnd(side){
    const knob=document.getElementById('knob-'+side);
    if(knob){knob.style.left='50%';knob.style.top='50%';}
    if(side==='L') G.state.joints.yawR=0;
    if(side==='R'){G.state.joints.pitch=0;G.state.joints.roll=0;}
  },

  showBTab(tab){
    ['ctrl','const','telem','eq'].forEach(t=>{
      document.getElementById('btab-'+t).className='btab'+(t===tab?' on':'');
      document.getElementById('bpanel-'+t).className='bpanel'+(t===tab?' on':'');
    });
  },

  setTraj(type){
    G.traj=type; G.trajT=0;
    if(type==='manual'&&G.robot==='biped'){G.state.joints.walk=0;const btn=document.getElementById('walk-btn');if(btn){btn.textContent='🚶 Démarrer la marche';btn.classList.remove('walking');}}
    document.getElementById('sb-m').textContent=' '+type;
    ['manual','circle','square','fig8'].forEach(t=>{ const el=document.getElementById('tj-'+t); if(el) el.className='traj-btn'+(t===type?' on':''); });
  },

  toggleSim(){ G.simOn?this.stopSim():this.startSim(); },
  startSim(){
    G.simOn=true; G.simT=0; G.trajT=0;
    this.clearTraj(); oscBuf.length=0;
    document.getElementById('sled').classList.add('on');
    document.getElementById('st-lbl').textContent='En cours';
    document.getElementById('st-lbl').style.color='var(--green)';
    document.getElementById('btn-sim').textContent='⏹ Arrêter';
    document.getElementById('btn-sim').className='btn stop';
    G.simIv=setInterval(()=>this.tick(),33);
  },
  stopSim(){
    G.simOn=false; clearInterval(G.simIv);
    document.getElementById('sled').className='sled';
    document.getElementById('st-lbl').textContent='Arrêt';
    document.getElementById('st-lbl').style.color='';
    document.getElementById('btn-sim').textContent='▶ Simuler';
    document.getElementById('btn-sim').className='btn go';
  },

  tick(){
    const dt=.033; G.simT+=dt; G.trajT+=dt; G.state.t=G.simT;
    document.getElementById('st-t').textContent=G.simT.toFixed(3)+'s';
    document.getElementById('sb-t').textContent=' '+G.simT.toFixed(3)+'s';
    const def=ROBOTS[G.robot];
    if(G.traj!=='manual') def.autoTraj(G.state,G.traj,G.trajT);
    else def.applyKeys(G.state,G.keys,dt);
    def.kinematic(G.state,dt);
    if(robotMesh) def.animate(robotMesh,G.state,dt);
    // Trajectoire 3D
    const py=G.robot==='arm'?G.state.y:(G.state.alt||0);
    trajPts.push(new THREE.Vector3(G.state.x||0,py+.012,G.state.z||0));
    if(trajPts.length>1500) trajPts.shift();
    if(trajLine){scene.remove(trajLine);trajLine=null;}
    if(trajPts.length>1){
      trajLine=new THREE.Line(
        new THREE.BufferGeometry().setFromPoints(trajPts),
        new THREE.LineBasicMaterial({color:0x2563eb,opacity:.5,transparent:true})
      );
      scene.add(trajLine);
    }
    // Camera follow
    if(robotMesh&&G.robot!=='arm'){
      orb.tx+=(robotMesh.position.x-orb.tx)*.05;
      orb.tz+=(robotMesh.position.z-orb.tz)*.05;
      if(G.robot==='drone') orb.ty+=((G.state.alt||0)+.25-orb.ty)*.05;
      updCam();
    }
    // Osc
    const ov=G.state.vlin||G.state.alt||0;
    oscBuf.push(ov); if(oscBuf.length>450) oscBuf.shift();
    // Sync UI bras
    if(G.robot==='arm'){
      ['j1','j2','j3','j4','j5','j6'].forEach(id=>{
        const el=document.getElementById('jcv-'+id);
        if(el) el.textContent=(G.state.joints[id]||0).toFixed(1)+'°';
      });
    }
    if(G.robot==='drone'){const el=document.getElementById('thrust-disp');if(el) el.textContent=(G.state.joints.thrust||40).toFixed(0)+'%';}
    this.updateHUD(); this.updateEq(); this.updateTelem();
  },

  updateHUD(){
    const s=G.state;
    document.getElementById('h-x').textContent=`${(s.x||0).toFixed(3)} m`;
    document.getElementById('h-y').textContent=`${(s.y||s.alt||0).toFixed(3)} m`;
    document.getElementById('h-z').textContent=`${(s.z||0).toFixed(3)} m`;
    document.getElementById('h-yaw').textContent=`${((s.yaw||s.yawAng||0)*180/Math.PI).toFixed(1)}°`;
    document.getElementById('h-vl').textContent=`${(s.vlin||0).toFixed(3)} m/s`;
    document.getElementById('h-va').textContent=`${(s.vang||0).toFixed(1)} °/s`;
    document.getElementById('h-ac').textContent=`${(s.accel||0).toFixed(3)} m/s²`;
  },

  updateEq(){
    const secs=ROBOTS[G.robot].equations(G.state);
    const html=secs.map(([t,...ls])=>`<div class="esec"><div class="esec-t">${t}</div>${ls.map(l=>`<div class="eline">${l.replace(/(-?[0-9]+\.?[0-9]*)/g,'<span class="n">$1</span>')}</div>`).join('')}</div>`).join('');
    const eq=document.getElementById('eq'); if(eq) eq.innerHTML=html;
    const eqm=document.getElementById('eq-mobile'); if(eqm) eqm.innerHTML=html;
  },

  updateTelem(){
    const items=ROBOTS[G.robot].telem(G.state);
    const html=items.map(t=>`<div class="tc"><div class="tc-l">${t.l}</div><div class="tc-v" style="color:${t.c}">${t.v}</div><div class="tc-u">${t.u}</div></div>`).join('');
    const tel=document.getElementById('telem'); if(tel) tel.innerHTML=html;
    const mhtml=items.map(t=>`<div class="tcm"><div class="tcm-l">${t.l}</div><div class="tcm-v" style="color:${t.c}">${t.v}</div><div class="tcm-u">${t.u}</div></div>`).join('');
    const telm=document.getElementById('telem-mobile'); if(telm) telm.innerHTML=mhtml;
  },

  resetRobot(){
    const def=ROBOTS[G.robot];
    G.state={x:0,z:0,y:0,yaw:0,vlin:0,vang:0,accel:0,omega:0,prevVl:0,dist:0,alt:0,vz:0,walkPhase:0,yawAng:0,t:0,_x:0,_z:0,_dx:0,_dz:0,joints:{}};
    G.state.joints={...def.defaults};
    this.clearTraj(); oscBuf.length=0;
    if(robotMesh){robotMesh.position.set(0,0,0);robotMesh.rotation.set(0,0,0);}
    def.focus();
    if(robotMesh) def.animate(robotMesh,G.state,.033);
    this.updateHUD(); this.updateEq(); this.updateTelem();
    ['up','down','left','right'].forEach(k=>G.keys[k]=false);
    const wb=document.getElementById('walk-btn');
    if(wb){wb.textContent='🚶 Démarrer la marche';wb.classList.remove('walking');}
  },

  clearTraj(){ trajPts.length=0; if(trajLine){scene.remove(trajLine);trajLine=null;} },

  exportEq(){
    const secs=ROBOTS[G.robot].equations(G.state);
    let txt=`=== ${ROBOTS[G.robot].name} ===\nt=${G.simT.toFixed(3)}s\n\n`;
    secs.forEach(([t,...ls])=>{txt+=`--- ${t} ---\n`;ls.forEach(l=>txt+=l+'\n');txt+='\n';});
    txt+='--- Télémétrie ---\n';
    ROBOTS[G.robot].telem(G.state).forEach(t=>{txt+=`${t.l}: ${t.v} ${t.u}\n`;});
    document.getElementById('m-t').textContent='Équations — '+ROBOTS[G.robot].name;
    document.getElementById('m-b').textContent=txt;
    document.getElementById('modal').classList.add('on');
  }
};

// Clavier
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();App.toggleSim();}
  if(e.key==='r'||e.key==='R') App.resetRobot();
  if(e.key==='1') App.setRobot('rover');
  if(e.key==='2') App.setRobot('arm');
  if(e.key==='3') App.setRobot('drone');
  if(e.key==='4') App.setRobot('biped');
  if(e.key==='ArrowUp'){e.preventDefault();App.kd('up',true);}
  if(e.key==='ArrowDown'){e.preventDefault();App.kd('down',true);}
  if(e.key==='ArrowLeft'){e.preventDefault();App.kd('left',true);}
  if(e.key==='ArrowRight'){e.preventDefault();App.kd('right',true);}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp') App.kd('up',false);
  if(e.key==='ArrowDown') App.kd('down',false);
  if(e.key==='ArrowLeft') App.kd('left',false);
  if(e.key==='ArrowRight') App.kd('right',false);
});

// Boucle de rendu
let _fc=0,_ft=Date.now();
function renderLoop(){
  requestAnimationFrame(renderLoop);
  _fc++; const now=Date.now();
  if(now-_ft>=1000){document.getElementById('st-fps').textContent=_fc+'fps';_fc=0;_ft=now;}
  renderer.render(scene,camera);
  renderOsc();
}

// Démarrage après chargement DOM
window.addEventListener('load',()=>{
  resizeAll();
  updCam();
  App.setRobot('rover');
  renderLoop();
});
</script>
</body>
</html>
