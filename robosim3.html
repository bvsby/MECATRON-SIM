<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RoboSim</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d1117; --s1: #161b22; --s2: #1c2128; --s3: #21262d;
  --b1: #30363d; --b2: #444c56; --b3: #6e7681;
  --t1: #e6edf3; --t2: #8b949e; --t3: #484f58;
  --blue: #58a6ff; --green: #3fb950; --red: #f85149;
  --amber: #d29922; --purple: #bc8cff; --cyan: #39d0d8; --orange: #f0883e;
  --safe: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; touch-action:none; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--t1); }

/* ── APP SHELL ── */
#app { display:flex; flex-direction:column; height:100dvh; height:100vh; }

/* ── TOPBAR ── */
#topbar {
  height:52px; background:var(--s1); border-bottom:1px solid var(--b1);
  display:flex; align-items:center; padding:0 12px; gap:8px;
  flex-shrink:0; overflow-x:auto; overflow-y:hidden;
}
#topbar::-webkit-scrollbar { display:none; }
.logo { font-weight:700; font-size:15px; display:flex; align-items:center; gap:7px; flex-shrink:0; }
.dot { width:8px; height:8px; border-radius:50%; background:var(--blue); box-shadow:0 0 10px var(--blue); animation:glow 2s infinite; }
@keyframes glow { 0%,100%{box-shadow:0 0 8px var(--blue)} 50%{box-shadow:0 0 20px var(--blue)} }
.sep { width:1px; height:22px; background:var(--b1); flex-shrink:0; }

/* Robot tabs */
.rtabs { display:flex; gap:3px; flex-shrink:0; }
.rtab {
  height:30px; padding:0 10px; border-radius:6px; border:1px solid var(--b1);
  background:transparent; color:var(--t3); font:500 12px 'Inter'; cursor:pointer;
  white-space:nowrap; transition:all .12s; display:flex; align-items:center; gap:5px;
}
.rtab.on { background:rgba(88,166,255,.12); border-color:rgba(88,166,255,.4); color:var(--blue); }
.rtab:hover:not(.on) { background:var(--s3); color:var(--t2); }

/* Sim controls */
.sim-btn {
  height:30px; padding:0 12px; border-radius:6px; border:1px solid;
  font:600 12px 'Inter'; cursor:pointer; flex-shrink:0; display:flex; align-items:center; gap:5px;
  transition:all .12s; white-space:nowrap;
}
.sim-btn.go  { background:rgba(63,185,80,.12); border-color:rgba(63,185,80,.4); color:var(--green); }
.sim-btn.stop{ background:rgba(248,81,73,.12); border-color:rgba(248,81,73,.4); color:var(--red); }
.sim-btn.neu { background:transparent; border-color:var(--b1); color:var(--t2); }
.sim-btn.neu:hover { background:var(--s3); color:var(--t1); }

.sim-status {
  margin-left:auto; display:flex; align-items:center; gap:8px;
  font-family:'JetBrains Mono'; font-size:11px; flex-shrink:0;
}
.sled { width:6px; height:6px; border-radius:50%; background:var(--t3); }
.sled.on { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
#st-t { color:var(--cyan); }
#st-fps { color:var(--t3); font-size:10px; }

/* ── MAIN AREA ── */
#main { flex:1; display:flex; overflow:hidden; position:relative; }

/* ── VIEWPORT ── */
#vp { flex:1; position:relative; overflow:hidden; background:var(--bg); }
#cv { display:block; width:100%; height:100%; }

/* HUD Position */
#hud-pos {
  position:absolute; top:8px; left:8px;
  background:rgba(22,27,34,.88); border:1px solid var(--b1);
  border-radius:8px; padding:7px 10px; backdrop-filter:blur(12px);
  font-size:11px; min-width:140px; pointer-events:none;
}
.hud-title { font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
.hud-row { display:flex; justify-content:space-between; gap:12px; margin-bottom:1px; }
.hud-lbl { color:var(--t3); font-size:10px; }
.hud-val { font-family:'JetBrains Mono'; font-size:11px; font-weight:500; }

/* HUD Dynamics */
#hud-dyn {
  position:absolute; top:8px; left:160px;
  background:rgba(22,27,34,.88); border:1px solid var(--b1);
  border-radius:8px; padding:7px 10px; backdrop-filter:blur(12px);
  font-size:11px; min-width:140px; pointer-events:none;
}
@media (max-width:600px) {
  #hud-pos { top:6px; left:6px; padding:5px 8px; min-width:auto; font-size:10px; }
  #hud-dyn { top:6px; left:auto; right:6px; padding:5px 8px; min-width:auto; font-size:10px; }
  .hud-title { font-size:8px; margin-bottom:2px; }
  .hud-row { gap:8px; }
  .hud-lbl { font-size:9px; }
  .hud-val { font-size:10px; }
}

/* Trajectory panel */
#traj-panel {
  position:absolute; bottom:8px; right:8px;
  background:rgba(22,27,34,.9); border:1px solid var(--b1);
  border-radius:8px; padding:10px; backdrop-filter:blur(12px); width:130px;
}
@media (max-width:600px) {
  #traj-panel { width:148px; padding:6px; bottom:6px; right:6px; display:flex; flex-wrap:wrap; gap:4px; }
  #traj-panel .tp-title { display:none; }
  #traj-panel .traj-btn { width:auto; flex:1 1 40%; height:30px; margin-bottom:0; font-size:15px; padding:0; display:flex; align-items:center; justify-content:center; }
  #traj-panel .traj-btn span.lbl { display:none; }
  #traj-panel .clear-traj { flex:1 1 100%; margin-top:0; height:24px; font-size:9px; }
  #traj-panel .clear-traj span.lbl { display:inline; }
  #hint { display:none; }
}
.tp-title { font-size:9px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:7px; }
.traj-btn {
  display:block; width:100%; height:28px; margin-bottom:4px; border-radius:5px;
  border:1px solid var(--b1); background:transparent; color:var(--t2);
  font:500 11px 'Inter'; cursor:pointer; transition:all .12s;
}
.traj-btn:hover { background:var(--s3); color:var(--t1); }
.traj-btn.on { background:rgba(88,166,255,.1); border-color:rgba(88,166,255,.4); color:var(--blue); }
.clear-traj {
  display:block; width:100%; height:24px; margin-top:6px; border-radius:5px;
  border:1px solid rgba(248,81,73,.3); background:transparent; color:var(--red);
  font:500 10px 'Inter'; cursor:pointer; transition:all .12s;
}
.clear-traj:hover { background:rgba(248,81,73,.1); }

/* Help hint */
#hint {
  position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
  background:rgba(22,27,34,.8); border:1px solid var(--b1); border-radius:20px;
  padding:5px 14px; font-size:11px; color:var(--t3); white-space:nowrap;
  pointer-events:none; backdrop-filter:blur(10px);
}
@media (pointer:coarse) { #hint { display:none; } }

/* ── RIGHT PANEL (desktop) ── */
#right {
  width:270px; background:var(--s1); border-left:1px solid var(--b1);
  display:flex; flex-direction:column; overflow:hidden; flex-shrink:0;
}
@media (max-width:1100px) { #right { display:none; } }

/* ── CONTROL PANEL (desktop, always visible) ── */
#ctrl-col {
  width:240px; background:var(--s1); border-left:1px solid var(--b1);
  display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0;
}
#ctrl-col::-webkit-scrollbar { width:3px; }
#ctrl-col::-webkit-scrollbar-thumb { background:var(--b1); }
@media (max-width:1100px) { #ctrl-col { display:none; } }
.ctrl-col-head {
  padding:7px 12px; font-size:10px; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--t3); border-bottom:1px solid var(--b1); flex-shrink:0;
}

.rhead {
  padding:7px 12px; font-size:10px; font-weight:600; letter-spacing:.1em;
  text-transform:uppercase; color:var(--t3); border-bottom:1px solid var(--b1);
  display:flex; justify-content:space-between; align-items:center; flex-shrink:0;
}
.rhead-btn {
  height:18px; padding:0 6px; border-radius:3px; border:1px solid var(--b1);
  background:transparent; color:var(--t3); font:400 9px 'Inter'; cursor:pointer;
}
.rhead-btn:hover { color:var(--t2); border-color:var(--b2); }

#eq { padding:9px 12px; overflow-y:auto; font-family:'JetBrains Mono'; font-size:10px; flex:0 0 auto; max-height:200px; }
#eq::-webkit-scrollbar { width:3px; }
#eq::-webkit-scrollbar-thumb { background:var(--b1); }
.esec { margin-bottom:9px; }
.esec-t { font-size:9px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--t3); margin-bottom:4px; font-family:'Inter'; }
.eline { color:var(--t2); line-height:1.5; margin-bottom:2px; }
.eline .n { color:var(--blue); }

#telem { flex:1; overflow-y:auto; padding:8px 10px; display:grid; grid-template-columns:1fr 1fr; gap:6px; align-content:start; }
#telem::-webkit-scrollbar { width:3px; }
.tc { background:var(--bg); border:1px solid var(--s3); border-radius:6px; padding:7px 8px; }
.tc-l { font-size:9px; color:var(--t3); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:2px; }
.tc-v { font-family:'JetBrains Mono'; font-size:13px; font-weight:600; }
.tc-u { font-size:9px; color:var(--t3); }

#osc-wrap { border-top:1px solid var(--b1); height:110px; display:flex; flex-direction:column; flex-shrink:0; }
#osc { flex:1; width:100%; display:block; }

/* ── BOTTOM PANEL (mobile) ── */
#bottom {
  background:var(--s1); border-top:1px solid var(--b1);
  display:none; flex-direction:column; overflow:hidden;
  flex-shrink:0; max-height:55vh;
}
@media (max-width:1100px) { #bottom { display:flex; } }
@media (min-width:769px) and (max-width:1100px) {
  #bottom { max-height:38vh; }
}

/* Bottom tabs */
.btabs { display:flex; border-bottom:1px solid var(--b1); flex-shrink:0; }
.btab {
  flex:1; height:38px; border:none; background:transparent; color:var(--t3);
  font:500 11px 'Inter'; cursor:pointer; transition:all .12s;
  border-bottom:2px solid transparent;
}
.btab.on { color:var(--blue); border-bottom-color:var(--blue); }

.bpanel { display:none; flex:1; overflow-y:auto; }
.bpanel.on { display:block; }
.bpanel::-webkit-scrollbar { width:3px; }

/* CONTROL PANEL */
#ctrl-panel-mobile, #ctrl-panel-desktop, #const-panel-desktop, #const-panel-mobile { padding:12px; }

/* Constants editor */
.const-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.const-card {
  background:var(--bg); border:1px solid var(--b1); border-radius:7px; padding:8px 10px;
}
.const-label { font-size:10px; color:var(--t3); margin-bottom:4px; font-weight:500; }
.const-input {
  width:100%; background:var(--s3); border:1px solid var(--b1); border-radius:4px;
  color:var(--t1); font:500 13px 'JetBrains Mono'; padding:4px 7px; outline:none;
  text-align:center;
}
.const-input:focus { border-color:rgba(88,166,255,.5); }
.const-unit { font-size:9px; color:var(--t3); text-align:center; margin-top:2px; }

/* Manual control buttons */
.ctrl-title { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--t3); margin-bottom:8px; }

/* ROVER controls */
.rover-ctrl { display:flex; flex-direction:column; align-items:center; gap:6px; }
.dpad { display:grid; grid-template-columns:60px 60px 60px; grid-template-rows:60px 60px 60px; gap:5px; }
.dpad-btn {
  border-radius:10px; border:1px solid var(--b2); background:var(--s2);
  color:var(--t2); font-size:20px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; transition:all .1s; user-select:none; -webkit-user-select:none;
  touch-action:none;
}
.dpad-btn:active, .dpad-btn.pressed { background:rgba(88,166,255,.2); border-color:var(--blue); color:var(--blue); transform:scale(.94); }
.dpad-center { background:var(--s3); }

/* ARM controls */
.arm-ctrl { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.joint-ctrl { background:var(--bg); border:1px solid var(--b1); border-radius:7px; padding:8px; }
.jc-name { font-size:10px; color:var(--t2); font-weight:500; margin-bottom:6px; }
.jc-val { font-family:'JetBrains Mono'; font-size:13px; color:var(--blue); margin-bottom:6px; text-align:center; }
.jc-btns { display:flex; gap:5px; }
.jc-btn {
  flex:1; height:32px; border-radius:6px; border:1px solid var(--b1); background:var(--s2);
  color:var(--t2); font-size:16px; cursor:pointer; transition:all .1s; touch-action:none;
}
.jc-btn:active { background:var(--s3); color:var(--t1); transform:scale(.95); }

/* DRONE controls */
.drone-ctrl { display:flex; gap:12px; align-items:flex-start; padding:4px; }
.drone-stick-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
.stick-label { font-size:10px; color:var(--t3); font-weight:600; letter-spacing:.08em; text-transform:uppercase; }
.stick-zone {
  width:120px; height:120px; border-radius:50%; border:2px solid var(--b2); background:var(--s2);
  position:relative; cursor:pointer; touch-action:none;
}
.stick-knob {
  width:40px; height:40px; border-radius:50%; background:var(--blue);
  box-shadow:0 0 12px rgba(88,166,255,.4); position:absolute;
  left:50%; top:50%; transform:translate(-50%,-50%);
  pointer-events:none; transition:box-shadow .1s;
}
.drone-alt-ctrl { display:flex; flex-direction:column; align-items:center; gap:6px; }
.alt-btn {
  width:50px; height:50px; border-radius:10px; border:1px solid var(--b2); background:var(--s2);
  color:var(--t2); font-size:22px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; transition:all .1s; touch-action:none;
}
.alt-btn:active { background:rgba(88,166,255,.2); border-color:var(--blue); color:var(--blue); transform:scale(.94); }

/* BIPED controls */
.biped-ctrl { display:flex; flex-direction:column; align-items:center; gap:10px; }
.walk-btn {
  width:100%; height:56px; border-radius:12px; border:2px solid var(--green);
  background:rgba(63,185,80,.1); color:var(--green); font:600 15px 'Inter';
  cursor:pointer; transition:all .12s; display:flex; align-items:center; justify-content:center; gap:8px;
}
.walk-btn.walking { background:rgba(63,185,80,.2); box-shadow:0 0 20px rgba(63,185,80,.3); }
.biped-turn { display:flex; gap:8px; width:100%; }
.turn-btn {
  flex:1; height:44px; border-radius:10px; border:1px solid var(--b2); background:var(--s2);
  color:var(--t2); font-size:22px; cursor:pointer; transition:all .1s; touch-action:none;
}
.turn-btn:active { background:var(--s3); color:var(--t1); transform:scale(.95); }

/* TELEM mobile */
#telem-mobile { padding:8px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
.tcm { background:var(--bg); border:1px solid var(--s3); border-radius:6px; padding:7px 8px; }
.tcm-l { font-size:9px; color:var(--t3); font-weight:600; letter-spacing:.05em; text-transform:uppercase; margin-bottom:2px; }
.tcm-v { font-family:'JetBrains Mono'; font-size:12px; font-weight:600; }
.tcm-u { font-size:8px; color:var(--t3); }

/* EQ mobile */
#eq-mobile { padding:10px 12px; font-family:'JetBrains Mono'; font-size:10px; }

/* STATUSBAR */
#sb {
  height:22px; background:var(--bg); border-top:1px solid var(--b1);
  display:flex; align-items:center; padding:0 12px; gap:14px;
  font-family:'JetBrains Mono'; font-size:9.5px; color:var(--t3);
  flex-shrink:0;
}
@media (max-width:768px) { #sb { display:none; } }
.si { display:flex; gap:4px; } .sv { color:var(--t2); }

/* MODAL */
#modal {
  position:fixed; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(6px);
  z-index:999; display:none; align-items:center; justify-content:center; padding:16px;
}
#modal.on { display:flex; }
.mbox {
  background:var(--s2); border:1px solid var(--b2); border-radius:10px;
  padding:20px; width:100%; max-width:520px; max-height:80vh; display:flex; flex-direction:column;
}
.mttl { font-size:15px; font-weight:600; margin-bottom:10px; }
.mbdy {
  font-family:'JetBrains Mono'; font-size:10.5px; white-space:pre;
  overflow-y:auto; color:var(--t2); flex:1; margin-bottom:12px; line-height:1.6;
}

/* Touch feedback */
@media (pointer:coarse) {
  .dpad-btn, .jc-btn, .alt-btn, .turn-btn { min-height:52px; min-width:52px; }
  .dpad { grid-template-columns:68px 68px 68px; grid-template-rows:68px 68px 68px; gap:6px; }
}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo"><div class="dot"></div>RoboSim</div>
  <div class="sep"></div>
  <div class="rtabs">
    <button class="rtab on" id="rt-rover" onclick="App.setRobot('rover')">🚗 Rover</button>
    <button class="rtab" id="rt-arm"   onclick="App.setRobot('arm')">🦾 Bras</button>
    <button class="rtab" id="rt-drone" onclick="App.setRobot('drone')">🚁 Drone</button>
    <button class="rtab" id="rt-biped" onclick="App.setRobot('biped')">🤖 Bipède</button>
  </div>
  <div class="sep"></div>
  <button class="sim-btn go" id="btn-sim" onclick="App.toggleSim()">▶ Simuler</button>
  <button class="sim-btn neu" onclick="App.resetRobot()">↺</button>
  <button class="sim-btn neu" onclick="App.exportEq()">📄</button>
  <div class="sim-status">
    <div class="sled" id="sled"></div>
    <span id="st-lbl" style="color:var(--t3)">Arrêt</span>
    <span id="st-t">0.000s</span>
    <span id="st-fps">--fps</span>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- VIEWPORT -->
  <div id="vp">
    <canvas id="cv"></canvas>

    <!-- HUD Position -->
    <div id="hud-pos">
      <div class="hud-title">Position</div>
      <div class="hud-row"><span class="hud-lbl">X</span><span class="hud-val" id="h-x" style="color:var(--red)">0.000 m</span></div>
      <div class="hud-row"><span class="hud-lbl">Y</span><span class="hud-val" id="h-y" style="color:var(--green)">0.000 m</span></div>
      <div class="hud-row"><span class="hud-lbl">Z</span><span class="hud-val" id="h-z" style="color:var(--blue)">0.000 m</span></div>
      <div class="hud-row"><span class="hud-lbl">Cap</span><span class="hud-val" id="h-yaw" style="color:var(--amber)">0.0°</span></div>
    </div>

    <!-- HUD Dynamics -->
    <div id="hud-dyn">
      <div class="hud-title">Dynamique</div>
      <div class="hud-row"><span class="hud-lbl">V</span><span class="hud-val" id="h-vl" style="color:var(--cyan)">0.000 m/s</span></div>
      <div class="hud-row"><span class="hud-lbl">ω</span><span class="hud-val" id="h-va" style="color:var(--purple)">0.0 °/s</span></div>
      <div class="hud-row"><span class="hud-lbl">a</span><span class="hud-val" id="h-ac" style="color:var(--orange)">0.000 m/s²</span></div>
    </div>

    <!-- Trajectoire -->
    <div id="traj-panel">
      <div class="tp-title">Trajectoire</div>
      <button class="traj-btn on" id="tj-manual" onclick="App.setTraj('manual')">🕹<span class="lbl"> Manuel</span></button>
      <button class="traj-btn" id="tj-circle" onclick="App.setTraj('circle')">⭕<span class="lbl"> Cercle</span></button>
      <button class="traj-btn" id="tj-square" onclick="App.setTraj('square')">⬛<span class="lbl"> Carré</span></button>
      <button class="traj-btn" id="tj-fig8"   onclick="App.setTraj('fig8')">∞<span class="lbl"> Figure 8</span></button>
      <button class="clear-traj" onclick="App.clearTraj()">✕<span class="lbl"> Effacer trace</span></button>
    </div>

    <div id="hint">Clic droit = orbiter · Molette = zoom · Alt+clic = pan</div>
  </div>

  <!-- CONTROL COLUMN (desktop, always visible) -->
  <div id="ctrl-col">
    <div class="ctrl-col-head">Contrôle Manuel</div>
    <div id="ctrl-panel-desktop" style="padding:12px"></div>
    <div class="ctrl-col-head">Constantes</div>
    <div id="const-panel-desktop" style="padding:12px"></div>
  </div>

  <!-- RIGHT PANEL (desktop) -->
  <div id="right">
    <div class="rhead">Équations <button class="rhead-btn" onclick="App.exportEq()">↓ Export</button></div>
    <div id="eq"></div>
    <div class="rhead">Télémétrie</div>
    <div id="telem"></div>
    <div id="osc-wrap">
      <div class="rhead" style="border-bottom:1px solid var(--b1)">Oscilloscope</div>
      <canvas id="osc"></canvas>
    </div>

<script>
// ═══════════════════════════════════════════════
// THREE.JS INIT
// ═══════════════════════════════════════════════
const cv = document.getElementById('cv');
const renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.setClearColor(0x0d1117, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0d1117, 0.09);

const camera = new THREE.PerspectiveCamera(45, 1, 0.001, 100);

// Lights
scene.add(new THREE.AmbientLight(0x8090b0, 0.18));
scene.add(new THREE.HemisphereLight(0xb0c8ff, 0x1a2030, 0.4));
const sun = new THREE.DirectionalLight(0xfff8f0, 2.8);
sun.position.set(5, 10, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-3; sun.shadow.camera.right=3;
sun.shadow.camera.top=3;   sun.shadow.camera.bottom=-3;
sun.shadow.camera.near=0.1; sun.shadow.camera.far=30;
sun.shadow.bias = -0.001;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x6090ff, 0.5);
fill.position.set(-4, 3, -3);
scene.add(fill);

// Ground
const gnd = new THREE.Mesh(new THREE.PlaneGeometry(40,40),
  new THREE.MeshStandardMaterial({color:0x0d1117, roughness:.95, metalness:.02}));
gnd.rotation.x = -Math.PI/2; gnd.receiveShadow = true;
scene.add(gnd);
const grid = new THREE.GridHelper(20, 40, 0x1e3a5f, 0x162030);
grid.position.y = 0.001;
grid.material.opacity = 0.6; grid.material.transparent = true;
scene.add(grid);
scene.add(new THREE.AxesHelper(0.35));

// Orbit camera
const orb = { theta:0.6, phi:0.62, r:1.4, tx:0, ty:0.15, tz:0 };
function updCam() {
  const{theta:t,phi:p,r,tx,ty,tz}=orb;
  camera.position.set(tx+r*Math.sin(p)*Math.sin(t), ty+r*Math.cos(p), tz+r*Math.sin(p)*Math.cos(t));
  camera.lookAt(tx,ty,tz);
}
updCam();

// Orbit mouse
let orb_drag=false, orb_pan=false, orb_lx=0, orb_ly=0;
cv.addEventListener('mousedown', e => {
  if(e.button===2){orb_drag=true;orb_lx=e.clientX;orb_ly=e.clientY;}
  if(e.button===1||(e.button===0&&e.altKey)){orb_pan=true;orb_lx=e.clientX;orb_ly=e.clientY;}
});
cv.addEventListener('mousemove', e => {
  if(orb_drag){
    orb.theta-=(e.clientX-orb_lx)*0.005;
    orb.phi=Math.max(.06,Math.min(Math.PI*.47,orb.phi+(e.clientY-orb_ly)*0.005));
    updCam(); orb_lx=e.clientX; orb_ly=e.clientY;
  }
  if(orb_pan){
    const dx=(e.clientX-orb_lx)*0.001*orb.r, dy=(e.clientY-orb_ly)*0.001*orb.r;
    const fwd=new THREE.Vector3(orb.tx,0,orb.tz).sub(camera.position).normalize();
    const right=new THREE.Vector3().crossVectors(fwd,new THREE.Vector3(0,1,0)).normalize();
    orb.tx-=right.x*dx; orb.tz-=right.z*dx; orb.ty+=dy;
    updCam(); orb_lx=e.clientX; orb_ly=e.clientY;
  }
});
cv.addEventListener('mouseup', ()=>{orb_drag=false;orb_pan=false;});
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('wheel', e=>{
  e.preventDefault();
  orb.r=Math.max(0.1,Math.min(20,orb.r*(e.deltaY>0?1.1:0.91)));
  updCam();
},{passive:false});

// Touch orbit
let tc0=null;
cv.addEventListener('touchstart', e=>{if(e.touches.length===1){tc0={x:e.touches[0].clientX,y:e.touches[0].clientY};}}, {passive:true});
cv.addEventListener('touchmove', e=>{
  if(e.touches.length===1&&tc0){
    const dx=(e.touches[0].clientX-tc0.x)*0.007;
    const dy=(e.touches[0].clientY-tc0.y)*0.007;
    orb.theta-=dx; orb.phi=Math.max(.06,Math.min(Math.PI*.47,orb.phi+dy));
    updCam(); tc0={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
}, {passive:true});
cv.addEventListener('touchend', ()=>{tc0=null;}, {passive:true});

function resizeAll() {
  const vp=document.getElementById('vp');
  renderer.setSize(vp.clientWidth, vp.clientHeight);
  camera.aspect=vp.clientWidth/vp.clientHeight;
  camera.updateProjectionMatrix();
  const ow=document.getElementById('osc-wrap');
  if(ow){osc_cv.width=ow.clientWidth; osc_cv.height=Math.max(1,ow.clientHeight-28);}
}
window.addEventListener('resize', resizeAll);

// ═══════════════════════════════════════════════
// MESH BUILDERS
// ═══════════════════════════════════════════════
function M(geo,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0){
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  return m;
}
const mats={
  dark:  ()=>new THREE.MeshStandardMaterial({color:0x1c2128,roughness:.45,metalness:.75}),
  metal: ()=>new THREE.MeshStandardMaterial({color:0x3a3f4a,roughness:.30,metalness:.80}),
  light: ()=>new THREE.MeshStandardMaterial({color:0xbbbbcc,roughness:.20,metalness:.90}),
  red:   ()=>new THREE.MeshStandardMaterial({color:0xc0392b,roughness:.35,metalness:.65}),
  tyre:  ()=>new THREE.MeshStandardMaterial({color:0x111111,roughness:.95,metalness:.01}),
  pcb:   ()=>new THREE.MeshStandardMaterial({color:0x1a5c2a,roughness:.85,metalness:.05}),
  gray:  ()=>new THREE.MeshStandardMaterial({color:0x444c56,roughness:.50,metalness:.70}),
  limb:  ()=>new THREE.MeshStandardMaterial({color:0x3d4355,roughness:.45,metalness:.65}),
  foot:  ()=>new THREE.MeshStandardMaterial({color:0x1a1a28,roughness:.8}),
};

function buildRover(){
  const g=new THREE.Group();
  // Chassis
  g.add(M(new THREE.BoxGeometry(.32,.045,.22),mats.metal()));
  g.add(M(new THREE.BoxGeometry(.20,.008,.14),mats.pcb(),0,.028,0));
  // Bords alu
  [.14,-.14].forEach(ox=>g.add(M(new THREE.BoxGeometry(.005,.05,.22),mats.light(),ox,0,0)));
  // 4 roues
  const wheels=[];
  [[.12,.005,.13],[.12,.005,-.13],[-.12,.005,.13],[-.12,.005,-.13]].forEach(([wx,wy,wz])=>{
    const wg=new THREE.Group(); wg.position.set(wx,wy,wz);
    const tyre=M(new THREE.CylinderGeometry(.048,.048,.042,24),mats.tyre());
    tyre.rotation.x=Math.PI/2; wg.add(tyre);
    const rim=M(new THREE.CylinderGeometry(.030,.030,.044,8),mats.gray());
    rim.rotation.x=Math.PI/2; wg.add(rim);
    for(let i=0;i<5;i++){
      const sp=M(new THREE.CylinderGeometry(.004,.004,.040,5),mats.light());
      sp.rotation.x=Math.PI/2; sp.rotation.z=(i/5)*Math.PI*2;
      sp.position.set(Math.cos((i/5)*Math.PI*2)*.018,Math.sin((i/5)*Math.PI*2)*.018,0);
      wg.add(sp);
    }
    g.add(wg); wheels.push(wg);
  });
  g.userData.wheels=wheels;
  // Mast + cam
  g.add(M(new THREE.CylinderGeometry(.007,.007,.14,8),mats.metal(),.07,.1,0));
  const camG=new THREE.Group(); camG.position.set(.07,.175,0);
  camG.add(M(new THREE.BoxGeometry(.044,.025,.032),mats.dark()));
  const lens=M(new THREE.CylinderGeometry(.009,.011,.015,12),mats.dark(),0,0,.022,Math.PI/2,0,0);
  camG.add(lens);
  g.add(camG); g.userData.camHead=camG;
  // Antenne
  g.add(M(new THREE.CylinderGeometry(.003,.003,.09,6),mats.light(),-.1,.085,.04));
  g.add(M(new THREE.SphereGeometry(.004,6,6),new THREE.MeshStandardMaterial({color:0xff3333,emissive:0xff0000,emissiveIntensity:.4}),-.1,.13,.04));
  // Bras irrigation
  g.add(M(new THREE.CylinderGeometry(.005,.005,.24,8),mats.metal(),-.04,.025,0,0,0,Math.PI/2));
  g.add(M(new THREE.CylinderGeometry(.006,.003,.025,8),mats.gray(),-.16,.025,0));
  // Boitier elec
  g.add(M(new THREE.BoxGeometry(.06,.022,.045),mats.dark(),0,.03,-.04));
  return g;
}

function buildArm(){
  const g=new THREE.Group();
  g.add(M(new THREE.CylinderGeometry(.11,.13,.045,32),mats.gray()));
  g.add(M(new THREE.CylinderGeometry(.085,.085,.018,32),mats.metal(),0,.032,0));
  const j1=new THREE.Group(); j1.position.y=.045; g.add(j1); g.userData.j1=j1;
  j1.add(M(new THREE.CylinderGeometry(.065,.065,.055,24),mats.dark()));
  const j2=new THREE.Group(); j2.position.set(0,.06,0); j1.add(j2); g.userData.j2=j2;
  j2.add(M(new THREE.CylinderGeometry(.052,.052,.040,16),mats.red(),0,0,0,Math.PI/2,0,0));
  const l1=new THREE.Group(); j2.add(l1);
  l1.add(M(new THREE.BoxGeometry(.052,.24,.052),mats.metal(),0,.12,0));
  const j3=new THREE.Group(); j3.position.y=.24; l1.add(j3); g.userData.j3=j3;
  j3.add(M(new THREE.CylinderGeometry(.044,.044,.038,16),mats.red(),0,0,0,Math.PI/2,0,0));
  const l2=new THREE.Group(); j3.add(l2);
  l2.add(M(new THREE.BoxGeometry(.044,.20,.044),mats.metal(),0,.10,0));
  const j4=new THREE.Group(); j4.position.y=.20; l2.add(j4); g.userData.j4=j4;
  j4.add(M(new THREE.CylinderGeometry(.034,.034,.034,16),mats.dark()));
  const j5=new THREE.Group(); j5.position.y=.034; j4.add(j5); g.userData.j5=j5;
  j5.add(M(new THREE.CylinderGeometry(.028,.028,.028,16),mats.red(),0,0,0,Math.PI/2,0,0));
  const l3=new THREE.Group(); j5.add(l3);
  l3.add(M(new THREE.BoxGeometry(.030,.11,.030),mats.metal(),0,.055,0));
  const j6=new THREE.Group(); j6.position.y=.11; l3.add(j6); g.userData.j6=j6;
  const f1=new THREE.Group(),f2=new THREE.Group();
  f1.add(M(new THREE.BoxGeometry(.010,.044,.010),mats.metal(),.012,0,0));
  f2.add(M(new THREE.BoxGeometry(.010,.044,.010),mats.metal(),-.012,0,0));
  j6.add(f1); j6.add(f2); g.userData.finger1=f1; g.userData.finger2=f2;
  const tcp=M(new THREE.SphereGeometry(.007,10,10),new THREE.MeshStandardMaterial({color:0x58a6ff,emissive:0x58a6ff,emissiveIntensity:.5}),0,.05,0);
  j6.add(tcp);
  return g;
}

function buildDrone(){
  const g=new THREE.Group();
  const cf=new THREE.MeshStandardMaterial({color:0x1a1a2e,roughness:.4,metalness:.75});
  const mM=new THREE.MeshStandardMaterial({color:0x2a2a3e,roughness:.3,metalness:.8});
  const pM=new THREE.MeshStandardMaterial({color:0x252535,roughness:.6,metalness:.2,transparent:true,opacity:.82});
  g.add(M(new THREE.BoxGeometry(.16,.022,.04),cf));
  g.add(M(new THREE.BoxGeometry(.04,.022,.16),cf));
  g.add(M(new THREE.BoxGeometry(.075,.028,.075),cf));
  g.add(M(new THREE.BoxGeometry(.055,.010,.055),new THREE.MeshStandardMaterial({color:0x1a3355,roughness:.8}),0,.02,0));
  const props=[];
  [[.08,0,.08],[.08,0,-.08],[-.08,0,.08],[-.08,0,-.08]].forEach(([mx,,mz],i)=>{
    g.add(M(new THREE.CylinderGeometry(.016,.016,.026,16),mM,mx,0,mz));
    g.add(M(new THREE.CylinderGeometry(.013,.013,.010,8),new THREE.MeshStandardMaterial({color:0xc0392b}),mx,.018,mz));
    const pg=new THREE.Group(); pg.position.set(mx,.024,mz);
    pg.add(M(new THREE.BoxGeometry(.13,.004,.018),pM));
    pg.add(M(new THREE.BoxGeometry(.018,.004,.13),pM));
    g.add(pg); props.push(pg);
  });
  g.userData.props=props;
  [[.06,0,.06],[.06,0,-.06],[-.06,0,.06],[-.06,0,-.06]].forEach(([lx,,lz])=>{
    g.add(M(new THREE.CylinderGeometry(.004,.004,.06,6),cf,lx,-.04,lz));
  });
  g.add(M(new THREE.BoxGeometry(.16,.004,.04),cf,0,-.07,0));
  g.add(M(new THREE.BoxGeometry(.04,.004,.16),cf,0,-.07,0));
  g.add(M(new THREE.BoxGeometry(.028,.020,.020),new THREE.MeshStandardMaterial({color:0x0a0a0a,roughness:.3,metalness:.6}),0,-.024,0));
  return g;
}

function buildBiped(){
  const g=new THREE.Group();
  function add(geo,mat,x=0,y=0,z=0,rx=0,ry=0,rz=0,p=g){const m=M(geo,mat,x,y,z,rx,ry,rz);p.add(m);return m;}
  const torsoG=new THREE.Group(); torsoG.position.y=.55; g.add(torsoG); g.userData.torso=torsoG;
  add(new THREE.BoxGeometry(.13,.19,.085),mats.dark(),0,0,0,0,0,0,torsoG);
  add(new THREE.SphereGeometry(.062,.16,.16),mats.dark(),0,.165,0,0,0,0,torsoG);
  add(new THREE.BoxGeometry(.042,.018,.026),new THREE.MeshStandardMaterial({color:0x39d0d8,emissive:0x39d0d8,emissiveIntensity:.4,metalness:.5}),0,.158,.058,0,0,0,torsoG);
  [-1,1].forEach(side=>{
    const sh=new THREE.Group(); sh.position.set(side*.1,.04,0); torsoG.add(sh);
    add(new THREE.CylinderGeometry(.020,.020,.012,12),mats.red(),0,0,0,0,0,Math.PI/2,sh);
    add(new THREE.BoxGeometry(.030,.12,.030),mats.limb(),0,-.07,0,0,0,0,sh);
    add(new THREE.BoxGeometry(.025,.10,.025),mats.limb(),0,-.19,0,0,0,0,sh);
  });
  const pelvis=new THREE.Group(); pelvis.position.y=.46; g.add(pelvis);
  add(new THREE.BoxGeometry(.115,.052,.072),mats.dark(),0,0,0,0,0,0,pelvis);
  // Jambe G
  const legLG=new THREE.Group(); legLG.position.set(.032,-.03,0); pelvis.add(legLG); g.userData.legLG=legLG;
  add(new THREE.CylinderGeometry(.020,.020,.012,12),mats.red(),0,0,0,Math.PI/2,0,0,legLG);
  const thL=new THREE.Group(); thL.position.y=-.03; legLG.add(thL);
  add(new THREE.BoxGeometry(.038,.22,.038),mats.limb(),0,-.11,0,0,0,0,thL);
  const knLG=new THREE.Group(); knLG.position.y=-.23; thL.add(knLG); g.userData.knLG=knLG;
  add(new THREE.CylinderGeometry(.018,.018,.012,12),mats.red(),0,0,0,Math.PI/2,0,0,knLG);
  const shL=new THREE.Group(); knLG.add(shL);
  add(new THREE.BoxGeometry(.032,.19,.032),mats.limb(),0,-.095,0,0,0,0,shL);
  const ankLG=new THREE.Group(); ankLG.position.y=-.19; shL.add(ankLG); g.userData.ankLG=ankLG;
  add(new THREE.BoxGeometry(.040,.018,.072),mats.foot(),0,-.012,.010,0,0,0,ankLG);
  // Jambe D
  const legRG=new THREE.Group(); legRG.position.set(-.032,-.03,0); pelvis.add(legRG); g.userData.legRG=legRG;
  add(new THREE.CylinderGeometry(.020,.020,.012,12),mats.red(),0,0,0,Math.PI/2,0,0,legRG);
  const thR=new THREE.Group(); thR.position.y=-.03; legRG.add(thR);
  add(new THREE.BoxGeometry(.038,.22,.038),mats.limb(),0,-.11,0,0,0,0,thR);
  const knRG=new THREE.Group(); knRG.position.y=-.23; thR.add(knRG); g.userData.knRG=knRG;
  add(new THREE.CylinderGeometry(.018,.018,.012,12),mats.red(),0,0,0,Math.PI/2,0,0,knRG);
  const shR=new THREE.Group(); knRG.add(shR);
  add(new THREE.BoxGeometry(.032,.19,.032),mats.limb(),0,-.095,0,0,0,0,shR);
  const ankRG=new THREE.Group(); ankRG.position.y=-.19; shR.add(ankRG); g.userData.ankRG=ankRG;
  add(new THREE.BoxGeometry(.040,.018,.072),mats.foot(),0,-.012,.010,0,0,0,ankRG);
  return g;
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let robotMesh=null, trajLine=null;
const trajPts=[];

const G={
  robot:'rover', simOn:false, simT:0, simIv:null,
  traj:'manual', trajT:0,
  fps:0,_fc:0,_ft:Date.now(),
  state:{x:0,z:0,y:0,yaw:0,vlin:0,vang:0,accel:0,prevVl:0,dist:0,alt:0,vz:0,walkPhase:0,yawAng:0,joints:{}},
  // CONSTANTES modifiables par robot
  consts:{
    rover:{ vmax:{l:'V max',v:2,mn:.1,mx:5,u:'m/s'}, vamax:{l:'ω max',v:120,mn:10,mx:360,u:'°/s'}, accel:{l:'Accél.',v:3,mn:.5,mx:10,u:'m/s²'}, L:{l:'Voie',v:0.26,mn:.05,mx:.8,u:'m'}, r:{l:'Rayon roue',v:0.048,mn:.01,mx:.15,u:'m'} },
    arm:  { spd:{l:'Vitesse',v:60,mn:5,mx:300,u:'°/s'}, L1:{l:'Long. L1',v:0.24,mn:.05,mx:.8,u:'m'}, L2:{l:'Long. L2',v:0.20,mn:.05,mx:.8,u:'m'}, L3:{l:'Long. L3',v:0.13,mn:.02,mx:.5,u:'m'} },
    drone:{ mass:{l:'Masse',v:0.5,mn:.1,mx:5,u:'kg'}, thrust_coef:{l:'Coef. poussée',v:1.25,mn:.8,mx:2,u:''}, vmax_horiz:{l:'V horiz max',v:8,mn:1,mx:20,u:'m/s'}, drag:{l:'Traînée',v:.2,mn:0,mx:1,u:''} },
    biped:{ walk_spd:{l:'Vitesse marche',v:.32,mn:.05,mx:1.5,u:'m/s'}, step_freq:{l:'Fréq. pas',v:2.2,mn:.5,mx:5,u:'Hz'}, step_amp:{l:'Amplitude',v:28,mn:5,mx:50,u:'°'} },
  },
  // Touches maintenues
  keys:{up:false,down:false,left:false,right:false},
};

// ═══════════════════════════════════════════════
// ROBOTS
// ═══════════════════════════════════════════════
const ROBOTS={
  rover:{
    name:'Rover Agricole 4WD', dof:4,
    build(){ return buildRover(); },
    focus(){ orb.tx=0;orb.ty=.15;orb.tz=0;orb.r=1.4;orb.phi=.62;updCam(); },
    kinematic(s,dt){
      const C=G.consts.rover;
      // Appliquer accélération
      const vl_tgt=s.joints.vlin||0;
      s.vlin=(s.vlin||0)+(vl_tgt-s.vlin||0)*Math.min(1,C.accel.v*dt);
      const va=(s.joints.vang||0)*Math.PI/180;
      s.yaw+=va*dt; s.x+=Math.cos(s.yaw)*s.vlin*dt; s.z+=Math.sin(s.yaw)*s.vlin*dt;
      s.vang=s.joints.vang||0; s.accel=(s.vlin-(s.prevVl||0))/dt; s.prevVl=s.vlin;
      s.dist=(s.dist||0)+Math.abs(s.vlin)*dt;
    },
    animate(g,s,dt){
      g.position.set(s.x,0,s.z); g.rotation.y=-s.yaw;
      const wR=(s.vlin||0)/G.consts.rover.r.v*dt;
      g.userData.wheels?.forEach(w=>{ w.children[0].rotation.z+=wR; });
      if(g.userData.camHead){ g.userData.camHead.rotation.y=(s.joints.camP||0)*Math.PI/180; g.userData.camHead.rotation.x=-(s.joints.camT||0)*Math.PI/180; }
    },
    autoTraj(s,traj,t){
      const C=G.consts.rover;
      if(traj==='circle'){ s.joints.vlin=C.vmax.v*.5; s.joints.vang=C.vamax.v*.35; }
      if(traj==='square'){ const ph=Math.floor(t/2.5)%4,inT=(t%2.5)>1.8; s.joints.vlin=inT?.05:C.vmax.v*.6; s.joints.vang=inT?C.vamax.v*.8:0; }
      if(traj==='fig8'){ s.joints.vlin=C.vmax.v*.45; s.joints.vang=Math.sin(t)*C.vamax.v*.55; }
    },
    applyKeys(s,keys,dt){
      const C=G.consts.rover;

  arm:{
    name:'Bras 6-DOF', dof:6,
    build(){ return buildArm(); },
    focus(){ orb.tx=0;orb.ty=.35;orb.tz=0;orb.r=1.1;orb.phi=.58;updCam(); },
    kinematic(s,dt){
      const C=G.consts.arm,j=s.joints;
      const t1=(j.j1||0)*Math.PI/180,t2=(j.j2||30)*Math.PI/180;
      const t3=(j.j3||-55)*Math.PI/180,t5=(j.j5||0)*Math.PI/180;
      const r=Math.cos(t2)*C.L1.v+Math.cos(t2+t3)*C.L2.v+Math.cos(t2+t3+t5)*C.L3.v;
      s.x=Math.cos(t1)*r; s.y=.045+Math.sin(t2)*C.L1.v+Math.sin(t2+t3)*C.L2.v+Math.sin(t2+t3+t5)*C.L3.v; s.z=Math.sin(t1)*r;
      const dx=s.x-(s.px||s.x),dy=s.y-(s.py||s.y),dz=s.z-(s.pz||s.z);
      s.vlin=Math.sqrt(dx*dx+dy*dy+dz*dz)/dt; s.px=s.x;s.py=s.y;s.pz=s.z;
    },
    animate(g,s){
      const j=s.joints;
      if(g.userData.j1) g.userData.j1.rotation.y=(j.j1||0)*Math.PI/180;
      if(g.userData.j2) g.userData.j2.rotation.x=-(j.j2||30)*Math.PI/180;
      if(g.userData.j3) g.userData.j3.rotation.x=-(j.j3||-55)*Math.PI/180;
      if(g.userData.j4) g.userData.j4.rotation.y=(j.j4||0)*Math.PI/180;
      if(g.userData.j5) g.userData.j5.rotation.x=-(j.j5||0)*Math.PI/180;
      if(g.userData.finger1) g.userData.finger1.rotation.z=(j.j6||0)*Math.PI/180*.45;
      if(g.userData.finger2) g.userData.finger2.rotation.z=-(j.j6||0)*Math.PI/180*.45;
    },
    autoTraj(s,traj,t){
      const sp=G.consts.arm.spd.v;
      if(traj==='circle'){ s.joints.j1=Math.sin(t*.8)*70;s.joints.j2=30+Math.sin(t*.4)*22;s.joints.j3=-55+Math.cos(t*.6)*18;s.joints.j5=Math.sin(t*.5)*25; }
      if(traj==='fig8'){ s.joints.j1=Math.sin(t)*55;s.joints.j2=20+Math.sin(t*2)*28;s.joints.j5=Math.cos(t*2)*32; }
      if(traj==='square'){ const ph=Math.floor(t*1.5)%4;const tg=[[60,25,-40],[60,-25,-40],[-60,-25,-40],[-60,25,-40]];s.joints.j1=tg[ph][0];s.joints.j2=tg[ph][1];s.joints.j3=tg[ph][2]; }

      if(keys.down) s.joints.j2=Math.max(-90,(s.joints.j2||30)-sp);
      if(keys.left) s.joints.j1=Math.max(-180,(s.joints.j1||0)-sp*2);
      if(keys.right) s.joints.j1=Math.min(180,(s.joints.j1||0)+sp*2);

    equations(s){

          `J1:a=0     d=.045 α=0    θ=${(j.j1||0).toFixed(1)}°`,

          `J3:a=${C.L2.v}  d=0    α=0    θ=${(j.j3||-55).toFixed(1)}°`,
          `J4:a=0     d=0    α=π/2  θ=${(j.j4||0).toFixed(1)}°`,

  drone:{
    name:'Drone Quadrirotor', dof:6,
    build(){ return buildDrone(); },
    focus(){ orb.tx=0;orb.ty=.3;orb.tz=0;orb.r=1.0;orb.phi=.55;updCam(); },
    kinematic(s,dt){
      const C=G.consts.drone;
      const T=(s.joints.thrust||40)/100;
      const g=9.81;
      const az=T*g*C.thrust_coef.v-g;
      s.vz=(s.vz||0)+az*dt-s.vz*(C.drag.v)*dt;
      s.alt=Math.max(0,(s.alt||0)+s.vz*dt);
      if(s.alt<=0) s.vz=0;
      s.yawAng=(s.yawAng||0)+(s.joints.yawR||0)*Math.PI/180*dt;
      const pitch=(s.joints.pitch||0)*Math.PI/180;
      const vhTgt=T*Math.sin(pitch)*C.vmax_horiz.v;
      s.vlin=(s.vlin||0)*0.92+vhTgt*0.08;
      s.x=(s.x||0)+Math.cos(s.yawAng)*s.vlin*dt;
      s.z=(s.z||0)+Math.sin(s.yawAng)*s.vlin*dt;
      s.accel=az; s.vang=s.joints.yawR||0; s.y=s.alt;
    },
    animate(g,s,dt){
      g.position.set(s.x,s.alt||0,s.z);
      g.rotation.y=-(s.yawAng||0);
      g.rotation.x=(s.joints.pitch||0)*Math.PI/180;
      g.rotation.z=-(s.joints.roll||0)*Math.PI/180;
      const T=(s.joints.thrust||40)/100;
      g.userData.props?.forEach((p,i)=>{ p.rotation.y+=(i%2===0?1:-1)*T*22*dt; });
    },
    autoTraj(s,traj,t){
      if(traj==='circle'){ s.joints.thrust=58;s.joints.pitch=12;s.joints.yawR=30;s.joints.roll=8; }
      if(traj==='fig8'){ s.joints.thrust=56;s.joints.pitch=Math.sin(t)*10;s.joints.roll=Math.sin(t*2)*8;s.joints.yawR=15; }
      if(traj==='square'){ const ph=Math.floor(t*1.2)%4;const pi=[12,-12,0,0],ro=[0,0,12,-12];s.joints.thrust=56;s.joints.pitch=pi[ph];s.joints.roll=ro[ph];s.joints.yawR=0; }
    },
    applyKeys(s,keys,dt){
      if(keys.up) s.joints.thrust=Math.min(100,(s.joints.thrust||40)+80*dt);
      if(keys.down) s.joints.thrust=Math.max(0,(s.joints.thrust||40)-80*dt);
      if(keys.left) s.joints.yawR=-60;
      if(keys.right) s.joints.yawR=60;
      if(!keys.left&&!keys.right) s.joints.yawR=0;
    },
    equations(s){
      const C=G.consts.drone,T=(s.joints?.thrust||40)/100;
      return [
        ['Newton-Euler',
          `m·z̈=ΣFᵢ·cos(φ)cos(θ)-m·g`,
          `   =${(T*C.mass.v*9.81*C.thrust_coef.v).toFixed(3)}-${(C.mass.v*9.81).toFixed(3)}=${(T*C.mass.v*9.81*C.thrust_coef.v-C.mass.v*9.81).toFixed(3)} N`,
          `m=${C.mass.v}kg  k_t=${C.thrust_coef.v}`],
        ['État',
          `Alt=${(s.alt||0).toFixed(3)}m  Vz=${(s.vz||0).toFixed(3)}m/s`,
          `Vh=${(s.vlin||0).toFixed(3)}m/s  a=${(s.accel||0).toFixed(3)}m/s²`,
          `Yaw=${((s.yawAng||0)*180/Math.PI).toFixed(1)}°`],
      ];
    },
    telem(s){
      return [{l:'Altitude',v:(s.alt||0).toFixed(3),u:'m',c:'#58a6ff'},{l:'V vert',v:(s.vz||0).toFixed(3),u:'m/s',c:'#39d0d8'},{l:'V horiz',v:(s.vlin||0).toFixed(3),u:'m/s',c:'#3fb950'},{l:'Accél',v:(s.accel||0).toFixed(3),u:'m/s²',c:'#f0883e'},{l:'Roll',v:(s.joints?.roll||0).toFixed(1),u:'°',c:'#f85149'},{l:'Pitch',v:(s.joints?.pitch||0).toFixed(1),u:'°',c:'#d29922'},{l:'Thrust',v:(s.joints?.thrust||40).toFixed(0),u:'%',c:'#bc8cff'},{l:'Cap',v:((s.yawAng||0)*180/Math.PI).toFixed(1),u:'°',c:'#58a6ff'}];
    }
  },

  biped:{
    name:'Robot Bipède', dof:12,
    build(){ return buildBiped(); },
    focus(){ orb.tx=0;orb.ty=.35;orb.tz=0;orb.r=1.3;orb.phi=.6;updCam(); },
    kinematic(s,dt){
      const C=G.consts.biped;
      if((s.joints.walk||0)>.5){
        s.walkPhase=(s.walkPhase||0)+dt*C.step_freq.v;
        const ph=s.walkPhase;
        s.joints.hL=Math.sin(ph)*C.step_amp.v;
        s.joints.kL=Math.abs(Math.sin(ph))*C.step_amp.v*1.35;
        s.joints.aL=Math.sin(ph)*-10;
        s.joints.hR=-Math.sin(ph)*C.step_amp.v;
        s.joints.kR=Math.abs(Math.cos(ph))*C.step_amp.v*1.35;
        s.joints.aR=-Math.sin(ph)*10;
        s.joints.torso=Math.sin(ph)*6;
        s.x=(s.x||0)+Math.cos(s.yaw||0)*C.walk_spd.v*dt;
        s.z=(s.z||0)+Math.sin(s.yaw||0)*C.walk_spd.v*dt;
        s.vlin=C.walk_spd.v;
      } else s.vlin=0;
    },
    animate(g,s){
      const j=s.joints||{};
      g.position.set(s.x||0,0,s.z||0);
      if(g.userData.torso) g.userData.torso.rotation.z=(j.torso||0)*Math.PI/180;
      if(g.userData.legLG) g.userData.legLG.rotation.x=(j.hL||0)*Math.PI/180;
      if(g.userData.knLG)  g.userData.knLG.rotation.x=-(j.kL||0)*Math.PI/180;
      if(g.userData.ankLG) g.userData.ankLG.rotation.x=(j.aL||0)*Math.PI/180;
      if(g.userData.legRG) g.userData.legRG.rotation.x=(j.hR||0)*Math.PI/180;
      if(g.userData.knRG)  g.userData.knRG.rotation.x=-(j.kR||0)*Math.PI/180;
      if(g.userData.ankRG) g.userData.ankRG.rotation.x=(j.aR||0)*Math.PI/180;
    },
    autoTraj(s,traj,t){
      s.joints.walk=1;
      if(traj==='circle') s.yaw=(s.yaw||0)+.8*(1/60);
      if(traj==='fig8') s.yaw=(s.yaw||0)+Math.sin(t*.5)*.05;
    },
    applyKeys(s,keys,dt){
      if(keys.up||keys.down){ s.joints.walk=1; if(keys.down) s.joints.walk=.5; }
      else s.joints.walk=0;
      if(keys.left) s.yaw=(s.yaw||0)-.04;
      if(keys.right) s.yaw=(s.yaw||0)+.04;
    },
    equations(s){
      const C=G.consts.biped,j=s.joints||{};
      const hL=(j.hL||0)*Math.PI/180,kL=(j.kL||0)*Math.PI/180;
      return [
        ['IK Jambe',
          `x_pied=L₁·sin(θ_h)+L₂·sin(θ_h+θ_k)`,
          `      =${(0.22*Math.sin(hL)+0.19*Math.sin(hL+kL)).toFixed(4)}m`,
          `y_pied=-L₁·cos(θ_h)-L₂·cos(θ_h+θ_k)`,
          `      =${(-0.22*Math.cos(hL)-0.19*Math.cos(hL+kL)).toFixed(4)}m`],
        ['Cycle de marche',
          `Phase=${((s.walkPhase||0)%(2*Math.PI)/(2*Math.PI)*100).toFixed(0)}%`,
          `Freq=${C.step_freq.v}Hz  Amp=${C.step_amp.v}°`,
          `V=${(s.vlin||0).toFixed(3)}m/s  X=${(s.x||0).toFixed(3)}m`],
      ];
    },
    telem(s){
      const j=s.joints||{};
      return [{l:'Hanche G',v:(j.hL||0).toFixed(1),u:'°',c:'#f85149'},{l:'Genou G',v:(j.kL||0).toFixed(1),u:'°',c:'#3fb950'},{l:'Hanche D',v:(j.hR||0).toFixed(1),u:'°',c:'#58a6ff'},{l:'Genou D',v:(j.kR||0).toFixed(1),u:'°',c:'#bc8cff'},{l:'Vitesse',v:(s.vlin||0).toFixed(3),u:'m/s',c:'#39d0d8'},{l:'Phase',v:((s.walkPhase||0)%(Math.PI*2)/(Math.PI*2)*100).toFixed(0),u:'%',c:'#f0883e'},{l:'Marche',v:(j.walk||0)>.5?'ON':'OFF',u:'',c:'#3fb950'},{l:'Pos X',v:(s.x||0).toFixed(3),u:'m',c:'#d29922'}];
    }
  }
};

// OSC
// ═══════════════════════════════════════════════
const osc_cv=document.getElementById('osc');
const osc_cx=osc_cv.getContext('2d');
const oscBuf=[];
function renderOsc(){
  const W=osc_cv.width,H=osc_cv.height;
  if(!W||!H)return;
  osc_cx.clearRect(0,0,W,H); osc_cx.fillStyle='#0a0d12'; osc_cx.fillRect(0,0,W,H);
  osc_cx.strokeStyle='rgba(255,255,255,.03)'; osc_cx.lineWidth=1;
  for(let i=1;i<8;i++){osc_cx.beginPath();osc_cx.moveTo(i*W/8,0);osc_cx.lineTo(i*W/8,H);osc_cx.stroke();}
  for(let i=1;i<4;i++){osc_cx.beginPath();osc_cx.moveTo(0,i*H/4);osc_cx.lineTo(W,i*H/4);osc_cx.stroke();}
  osc_cx.strokeStyle='rgba(255,255,255,.06)'; osc_cx.beginPath(); osc_cx.moveTo(0,H/2); osc_cx.lineTo(W,H/2); osc_cx.stroke();
  if(!G.simOn){osc_cx.fillStyle='rgba(100,116,139,.3)';osc_cx.font='10px JetBrains Mono';osc_cx.textAlign='center';osc_cx.fillText('▶ Simuler',W/2,H/2);return;}
  if(oscBuf.length<2)return;
  const mn=Math.min(...oscBuf),mx=Math.max(...oscBuf),rng=mx-mn||1;
  osc_cx.save();osc_cx.shadowBlur=4;osc_cx.shadowColor='#58a6ff';osc_cx.strokeStyle='#58a6ff';osc_cx.lineWidth=1.5;osc_cx.beginPath();
  oscBuf.forEach((v,i)=>{const px=(i/(oscBuf.length-1))*W,py=H-((v-mn)/rng)*(H*.76)-H*.12;i===0?osc_cx.moveTo(px,py):osc_cx.lineTo(px,py);});
  osc_cx.stroke();osc_cx.restore();
  osc_cx.fillStyle='#58a6ff';osc_cx.font='9px JetBrains Mono';osc_cx.textAlign='left';
  osc_cx.fillText(oscBuf[oscBuf.length-1].toFixed(3)+' m/s',5,11);
}

        ${jDefs.map(j=>`<div class="joint-ctrl">
          <div class="jc-name">${j.n}</div>
          <div class="jc-val" id="jcv-${j.id}">${(G.state.joints[j.id]||0).toFixed(1)}°</div>
          <div class="jc-btns">
            <button class="jc-btn" ontouchstart="App.jHold('${j.id}',-1)" onmousedown="App.jHold('${j.id}',-1)" ontouchend="App.jStop('${j.id}')" onmouseup="App.jStop('${j.id}')" onmouseleave="App.jStop('${j.id}')">−</button>
            <button class="jc-btn" style="font-size:11px;color:var(--t3)" onclick="App.setJ_arm('${j.id}',0)">0</button>
            <button class="jc-btn" ontouchstart="App.jHold('${j.id}',1)" onmousedown="App.jHold('${j.id}',1)" ontouchend="App.jStop('${j.id}')" onmouseup="App.jStop('${j.id}')" onmouseleave="App.jStop('${j.id}')">+</button>
          </div>
        </div>`).join('')}
      </div>`;
    }
    else if(r==='drone'){
      html=`
        <div class="ctrl-title">Contrôle Drone</div>
        <div class="drone-ctrl">
          <div class="drone-stick-wrap">
            <div class="stick-label">Lacet / Altitude</div>
            <div class="stick-zone" id="stick-left" ontouchstart="App.stickStart(event,'L')" ontouchmove="App.stickMove(event,'L')" ontouchend="App.stickEnd('L')" onmousedown="App.stickStart(event,'L')">
              <div class="stick-knob" id="knob-L"></div>
            </div>
          </div>
          <div class="drone-stick-wrap">
            <div class="stick-label">Direction</div>
            <div class="stick-zone" id="stick-right" ontouchstart="App.stickStart(event,'R')" ontouchmove="App.stickMove(event,'R')" ontouchend="App.stickEnd('R')" onmousedown="App.stickStart(event,'R')">
              <div class="stick-knob" id="knob-R"></div>
            </div>
          </div>
          <div class="drone-alt-ctrl">
            <div class="stick-label">Thrust</div>
            <button class="alt-btn" ontouchstart="App.kd('up',true)" ontouchend="App.kd('up',false)" onmousedown="App.kd('up',true)" onmouseup="App.kd('up',false)" onmouseleave="App.kd('up',false)">↑</button>
            <div style="font-family:'JetBrains Mono';font-size:12px;color:var(--blue)" id="thrust-disp">${(G.state.joints.thrust||40).toFixed(0)}%</div>
            <button class="alt-btn" ontouchstart="App.kd('down',true)" ontouchend="App.kd('down',false)" onmousedown="App.kd('down',true)" onmouseup="App.kd('down',false)" onmouseleave="App.kd('down',false)">↓</button>
          </div>
        </div>`;
    }
    else if(r==='biped'){
      html=`
        <div class="ctrl-title">Contrôle Bipède</div>
        <div class="biped-ctrl">
          <button class="walk-btn" id="walk-btn" onclick="App.toggleWalk()">🚶 Démarrer la marche</button>
          <div class="biped-turn">
            <button class="turn-btn" ontouchstart="App.kd('left',true)" ontouchend="App.kd('left',false)" onmousedown="App.kd('left',true)" onmouseup="App.kd('left',false)" onmouseleave="App.kd('left',false)">↺</button>
            <button class="turn-btn" style="flex:0 0 44px" onclick="App.resetRobot()">⊙</button>
            <button class="turn-btn" ontouchstart="App.kd('right',true)" ontouchend="App.kd('right',false)" onmousedown="App.kd('right',true)" onmouseup="App.kd('right',false)" onmouseleave="App.kd('right',false)">↻</button>
          </div>
          <div style="display:flex;gap:6px;width:100%">
            <button class="dpad-btn" style="flex:1;height:38px;border-radius:8px" onclick="App.poseBiped('squat')">🦵 Squat</button>
            <button class="dpad-btn" style="flex:1;height:38px;border-radius:8px" onclick="App.poseBiped('wave')">👋 Wave</button>
            <button class="dpad-btn" style="flex:1;height:38px;border-radius:8px" onclick="App.poseBiped('stand')">🧍 Debout</button>
          </div>
        </div>`;
    }
      document.getElementById('ctrl-panel-mobile') && (document.getElementById('ctrl-panel-mobile').innerHTML = html);
    document.getElementById('ctrl-panel-desktop') && (document.getElementById('ctrl-panel-desktop').innerHTML = html);
  },

  buildConstPanel(){
    const C=G.consts[G.robot];
    const html=`<div class="ctrl-title" style="margin-bottom:10px">Constantes — ${ROBOTS[G.robot].name}</div>
      <div class="const-grid">
        ${Object.entries(C).map(([k,p])=>`
          <div class="const-card">
            <div class="const-label">${p.l}</div>
            <input type="number" class="const-input" value="${p.v}" min="${p.mn}" max="${p.mx}"
              step="${(p.mx-p.mn)>10?.1:.001}"
              onchange="App.setConst('${k}',parseFloat(this.value))">
            <div class="const-unit">${p.u}</div>
          </div>`).join('')}
      </div>`;
    document.getElementById('const-panel-mobile') && (document.getElementById('const-panel-mobile').innerHTML = html);
    document.getElementById('const-panel-desktop') && (document.getElementById('const-panel-desktop').innerHTML = html);
  },

  setConst(k,v){
    const C=G.consts[G.robot];
    if(C[k]) C[k].v=Math.max(C[k].mn,Math.min(C[k].mx,v));
  },

  // Joint hold for arm
  jIntervals:{},
  jHold(id,dir){
    if(this.jIntervals[id]) clearInterval(this.jIntervals[id]);
    this.jIntervals[id]=setInterval(()=>{
      const C=G.consts.arm;
      const mins={j1:-180,j2:-90,j3:-135,j4:-180,j5:-90,j6:0};
      const maxs={j1:180,j2:90,j3:135,j4:180,j5:90,j6:85};
      const cur=G.state.joints[id]||0;
      const nv=Math.max(mins[id],Math.min(maxs[id],cur+dir*C.spd.v*.033));
      G.state.joints[id]=nv;
      const el=document.getElementById('jcv-'+id);
      if(el) el.textContent=nv.toFixed(1)+'°';
      if(!G.simOn&&robotMesh){ ROBOTS.arm.kinematic(G.state,.033); ROBOTS.arm.animate(robotMesh,G.state); this.updateHUD(); this.updateEq(); this.updateTelem(); }
    },33);
  },
  jStop(id){ if(this.jIntervals[id]){clearInterval(this.jIntervals[id]);delete this.jIntervals[id];} },
  setJ_arm(id,v){ G.state.joints[id]=v; const el=document.getElementById('jcv-'+id); if(el) el.textContent=v.toFixed(1)+'°'; if(!G.simOn&&robotMesh){ROBOTS.arm.animate(robotMesh,G.state);} },
  setJ_rover(id,v){ G.state.joints[id]=v; },

  stopRover(){ G.state.joints.vlin=0; G.state.joints.vang=0; G.state.vlin=0; },

  toggleWalk(){
    const w=G.state.joints.walk||0;
    G.state.joints.walk=w>.5?0:1;
    const btn=document.getElementById('walk-btn');
    if(btn){ if(G.state.joints.walk>.5){btn.textContent='⏹ Arrêter la marche';btn.classList.add('walking');}else{btn.textContent='🚶 Démarrer la marche';btn.classList.remove('walking');} }
  },

  poseBiped(pose){
    const j=G.state.joints;
    if(pose==='squat'){j.hL=30;j.kL=60;j.hR=30;j.kR=60;j.walk=0;}
    if(pose==='stand'){j.hL=0;j.kL=0;j.hR=0;j.kR=0;j.torso=0;j.walk=0;}
    if(pose==='wave'){j.hL=0;j.kL=0;j.hR=0;j.kR=0;j.walk=0;}
    if(robotMesh) ROBOTS.biped.animate(robotMesh,G.state);
  },

  // Keys
  kd(key,pressed){
    G.keys[key]=pressed;
    const btn=document.getElementById('dp-'+key);
    if(btn) btn.classList.toggle('pressed',pressed);
  },

  // Joysticks drone
  activeStick:null,
  stickStart(e,side){
    e.preventDefault();
    this.activeStick=side;
    if(e.type.includes('mouse')){
      const mm=ev=>this.stickMoveM(ev,side);
      const mu=()=>{ this.stickEnd(side); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
      window.addEventListener('mousemove',mm);
      window.addEventListener('mouseup',mu);
    }
  },
  stickMoveM(e,side){
    const id=side==='L'?'stick-left':'stick-right';
    const rect=document.getElementById(id).getBoundingClientRect();
    this.processStick(e.clientX,e.clientY,rect,side);
  },
  stickMove(e,side){
    e.preventDefault();
    if(e.touches.length<1)return;
    const id=side==='L'?'stick-left':'stick-right';
    const rect=document.getElementById(id).getBoundingClientRect();
    this.processStick(e.touches[0].clientX,e.touches[0].clientY,rect,side);
  },
  processStick(cx,cy,rect,side){
    const r=rect.width/2;
    const dx=Math.max(-r,Math.min(r,cx-rect.left-r));
    const dy=Math.max(-r,Math.min(r,cy-rect.top-r));
    const norm=Math.sqrt(dx*dx+dy*dy);
    const ndx=norm>r?dx/norm*r:dx, ndy=norm>r?dy/norm*r:dy;
    const knob=document.getElementById('knob-'+side);
    if(knob){knob.style.left=`calc(50% + ${ndx}px)`;knob.style.top=`calc(50% + ${ndy}px)`;}
    const nx=ndx/r, ny=ndy/r;
    if(side==='L'){ G.state.joints.yawR=nx*90; const ta=(G.state.joints.thrust||40)+-ny*3; G.state.joints.thrust=Math.max(0,Math.min(100,ta)); const el=document.getElementById('thrust-disp'); if(el) el.textContent=G.state.joints.thrust.toFixed(0)+'%'; }
    if(side==='R'){ G.state.joints.pitch=-ny*30; G.state.joints.roll=nx*25; }
  },
  stickEnd(side){
    const knob=document.getElementById('knob-'+side);
    if(knob){knob.style.left='50%';knob.style.top='50%';}
    if(side==='L') G.state.joints.yawR=0;
    if(side==='R'){G.state.joints.pitch=0;G.state.joints.roll=0;}
  },

  showBTab(tab){
    ['ctrl','const','telem','eq'].forEach(t=>{
      document.getElementById('btab-'+t).className='btab'+(t===tab?' on':'');
      document.getElementById('bpanel-'+t).className='bpanel'+(t===tab?' on':'');
    });
  },

  setTraj(type){
    G.traj=type; G.trajT=0;
    if(type==='manual'&&G.robot==='biped'){G.state.joints.walk=0;const btn=document.getElementById('walk-btn');if(btn){btn.textContent='🚶 Démarrer la marche';btn.classList.remove('walking');}}
    document.getElementById('sb-m').textContent=' '+type;
    ['manual','circle','square','fig8'].forEach(t=>{ document.getElementById('tj-'+t).className='traj-btn'+(t===type?' on':''); });
  },

  toggleSim(){ G.simOn?this.stopSim():this.startSim(); },
  startSim(){
    G.simOn=true; G.simT=0; G.trajT=0;
    this.clearTraj(); oscBuf.length=0;
    document.getElementById('sled').classList.add('on');
    document.getElementById('st-lbl').textContent='En cours'; document.getElementById('st-lbl').style.color='var(--green)';
    document.getElementById('btn-sim').textContent='⏹ Arrêter'; document.getElementById('btn-sim').className='sim-btn stop';
    G.simIv=setInterval(()=>this.tick(),33);
  },
  stopSim(){
    G.simOn=false; clearInterval(G.simIv);
    document.getElementById('sled').className='sled';
    document.getElementById('st-lbl').textContent='Arrêt'; document.getElementById('st-lbl').style.color='';
    document.getElementById('btn-sim').innerHTML='▶ Simuler'; document.getElementById('btn-sim').className='sim-btn go';
  },

  tick(){
    const dt=.033; G.simT+=dt; G.trajT+=dt;
    document.getElementById('st-t').textContent=G.simT.toFixed(3)+'s';
    document.getElementById('sb-t').textContent=' '+G.simT.toFixed(3)+'s';
    const def=ROBOTS[G.robot];
    // Auto trajectory
    if(G.traj!=='manual') def.autoTraj(G.state,G.traj,G.trajT);
    // Manual keys
    else def.applyKeys(G.state,G.keys,dt);
    // Kinematic
    def.kinematic(G.state,dt);
    // Animate
    if(robotMesh) def.animate(robotMesh,G.state,dt);
    // Traj line
    const py=G.state.alt||0;
    trajPts.push(new THREE.Vector3(G.state.x,py+(G.robot==='arm'?G.state.y:0.012),G.state.z));
    if(trajPts.length>1200) trajPts.shift();
    if(trajLine){scene.remove(trajLine);trajLine=null;}
    if(trajPts.length>1){
      const geo=new THREE.BufferGeometry().setFromPoints(trajPts);
      trajLine=new THREE.Line(geo,new THREE.LineBasicMaterial({color:0x58a6ff,opacity:.5,transparent:true}));
      scene.add(trajLine);
    }
    // Camera follow
    if(robotMesh&&G.robot!=='arm'){
      orb.tx+=(robotMesh.position.x-orb.tx)*.05;
      orb.tz+=(robotMesh.position.z-orb.tz)*.05;
      if(G.robot==='drone') orb.ty+=((G.state.alt||0)+.3-orb.ty)*.05;
      updCam();
    }
    // Osc
    const ov=G.state.vlin||G.state.alt||0;
    oscBuf.push(ov); if(oscBuf.length>450) oscBuf.shift();
    // Update arm joint vals
    if(G.robot==='arm'){
      ['j1','j2','j3','j4','j5','j6'].forEach(id=>{
        const el=document.getElementById('jcv-'+id);
        if(el) el.textContent=(G.state.joints[id]||0).toFixed(1)+'°';
      });
    }
    // Drone thrust display
    if(G.robot==='drone'){ const el=document.getElementById('thrust-disp'); if(el) el.textContent=(G.state.joints.thrust||40).toFixed(0)+'%'; }
    this.updateHUD(); this.updateEq(); this.updateTelem();
  },

  updateHUD(){
    const s=G.state;
    document.getElementById('h-x').textContent=`${(s.x||0).toFixed(3)} m`;
    document.getElementById('h-y').textContent=`${(s.y||s.alt||0).toFixed(3)} m`;
    document.getElementById('h-z').textContent=`${(s.z||0).toFixed(3)} m`;
    document.getElementById('h-yaw').textContent=`${((s.yaw||s.yawAng||0)*180/Math.PI).toFixed(1)}°`;
    document.getElementById('h-vl').textContent=`${(s.vlin||0).toFixed(3)} m/s`;
    document.getElementById('h-va').textContent=`${(s.vang||0).toFixed(1)} °/s`;
    document.getElementById('h-ac').textContent=`${(s.accel||0).toFixed(3)} m/s²`;
  },

  updateEq(){
    const secs=ROBOTS[G.robot].equations(G.state);
    const html=secs.map(([t,...ls])=>`<div class="esec"><div class="esec-t">${t}</div>${ls.map(l=>`<div class="eline">${l.replace(/(-?[0-9]+\.?[0-9]*)/g,'<span class="n">$1</span>')}</div>`).join('')}</div>`).join('');
    document.getElementById('eq').innerHTML=html;
    document.getElementById('eq-mobile').innerHTML=html;
  },

  updateTelem(){
    const items=ROBOTS[G.robot].telem(G.state);
    const html=items.map(t=>`<div class="tc"><div class="tc-l">${t.l}</div><div class="tc-v" style="color:${t.c}">${t.v}</div><div class="tc-u">${t.u}</div></div>`).join('');
    document.getElementById('telem').innerHTML=html;
    const mhtml=items.map(t=>`<div class="tcm"><div class="tcm-l">${t.l}</div><div class="tcm-v" style="color:${t.c}">${t.v}</div><div class="tcm-u">${t.u}</div></div>`).join('');
    document.getElementById('telem-mobile').innerHTML=mhtml;
  },

  resetRobot(){
    const def=ROBOTS[G.robot];
    G.state={x:0,z:0,y:0,yaw:0,vlin:0,vang:0,accel:0,prevVl:0,dist:0,alt:0,vz:0,walkPhase:0,yawAng:0,joints:{}};
    const defaults={rover:{vlin:0,vang:0,camP:0,camT:0,pump:0},arm:{j1:0,j2:30,j3:-55,j4:0,j5:0,j6:0},drone:{thrust:40,roll:0,pitch:0,yawR:0},biped:{hL:0,kL:0,aL:0,hR:0,kR:0,aR:0,torso:0,walk:0}};
    G.state.joints={...defaults[G.robot]};
    this.clearTraj(); oscBuf.length=0;
    if(robotMesh){robotMesh.position.set(0,0,0);robotMesh.rotation.set(0,0,0);}
    def.focus();
    if(robotMesh) def.animate(robotMesh,G.state,.033);
    this.updateHUD(); this.updateEq(); this.updateTelem();
    if(G.robot==='biped'){const btn=document.getElementById('walk-btn');if(btn){btn.textContent='🚶 Démarrer la marche';btn.classList.remove('walking');}}
  },

  clearTraj(){ trajPts.length=0; if(trajLine){scene.remove(trajLine);trajLine=null;} },

  exportEq(){
    const secs=ROBOTS[G.robot].equations(G.state);
    let txt=`=== ${ROBOTS[G.robot].name} ===\nt=${G.simT.toFixed(3)}s\n\n`;
    secs.forEach(([t,...ls])=>{txt+=`--- ${t} ---\n`;ls.forEach(l=>txt+=l+'\n');txt+='\n';});
    txt+='--- Télémétrie ---\n';
    ROBOTS[G.robot].telem(G.state).forEach(t=>{txt+=`${t.l}: ${t.v} ${t.u}\n`;});
    document.getElementById('m-t').textContent='Équations — '+ROBOTS[G.robot].name;
    document.getElementById('m-b').textContent=txt;
    document.getElementById('modal').classList.add('on');
  }
};

// Keyboard
window.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key===' '){e.preventDefault();App.toggleSim();}
  if(e.key==='r'||e.key==='R') App.resetRobot();
  if(e.key==='1') App.setRobot('rover');
  if(e.key==='2') App.setRobot('arm');
  if(e.key==='3') App.setRobot('drone');
  if(e.key==='4') App.setRobot('biped');
  if(e.key==='ArrowUp'){e.preventDefault();App.kd('up',true);}
  if(e.key==='ArrowDown'){e.preventDefault();App.kd('down',true);}
  if(e.key==='ArrowLeft'){e.preventDefault();App.kd('left',true);}
  if(e.key==='ArrowRight'){e.preventDefault();App.kd('right',true);}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp') App.kd('up',false);
  if(e.key==='ArrowDown') App.kd('down',false);
  if(e.key==='ArrowLeft') App.kd('left',false);
  if(e.key==='ArrowRight') App.kd('right',false);
});

// Render loop
let _fc=0,_ft=Date.now();
function renderLoop(){
  requestAnimationFrame(renderLoop);
  _fc++;
  const now=Date.now();
  if(now-_ft>=1000){document.getElementById('st-fps').textContent=_fc+'fps';_fc=0;_ft=now;}
  renderer.render(scene,camera);
  renderOsc();
}

// START
window.addEventListener('load',()=>{
  resizeAll();
  App.setRobot('rover');
  renderLoop();
});
</script>
</body>
</html>
